<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lumen Light · Briefing Review</title>
  <style>
    :root { --line: #e2e2e8; --muted: #6b7280; --ink: #1f2330; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--ink); background: #f6f6f9;
    }
    header { padding: 16px 24px; background: #fff; border-bottom: 1px solid var(--line); }
    header h1 { margin: 0; font-size: 18px; }
    header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; padding: 16px 24px; }
    .pane { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 14px; min-height: 200px; }
    .pane h2 { margin: 0 0 10px; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
    #source { line-height: 1.7; white-space: pre-wrap; }
    mark.lumen-span { background: rgba(255,191,64,.25); border-radius: 2px; padding: 0 1px; }
    mark.lumen-span-active { background: rgba(255,191,64,.65); box-shadow: 0 0 0 2px rgba(255,191,64,.4); }
    .turn {
      display: block; width: 100%; text-align: left; margin: 0 0 8px; padding: 10px 12px;
      border: 1px solid var(--line); border-radius: 8px; background: #fbfbfd; cursor: pointer; font: inherit;
    }
    .turn:hover { border-color: #c9c9d4; }
    .turn-active { border-color: #8b5cf6; background: #f3efff; }
    .card { border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
    .card-meta { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .card-text { margin: 6px 0 10px; }
    .card-actions button { font: inherit; margin-right: 6px; padding: 4px 10px; border: 1px solid var(--line); border-radius: 6px; background: #fff; cursor: pointer; }
    .card-accepted { border-color: #16a34a; background: #f0fdf4; }
    .card-rejected { border-color: #dc2626; background: #fef2f2; opacity: .7; }
    .card-edited { border-color: #d97706; background: #fffbeb; }
    .projection-pane { padding: 0 24px 16px; }
    .projection-head { display: flex; align-items: baseline; gap: 16px; }
    .projection-head label { font-size: 12px; color: var(--muted); display: inline-flex; align-items: center; gap: 6px; }
    #projectionMeta { font-size: 12px; color: var(--muted); }
    #projection {
      position: relative; background: #fcfcff;
      background-image: radial-gradient(#e6e6ef 1px, transparent 1px);
      background-size: 24px 24px;
      border: 1px solid var(--line); border-radius: 10px; min-height: 200px;
      overflow: auto; padding: 0;
    }
    .xd-card {
      position: absolute; border-style: solid; border-radius: 10px;
      padding: 10px 12px; box-shadow: 0 1px 2px rgba(15,17,23,.06);
      transition: box-shadow .15s ease;
    }
    .xd-card .xd-badge { font-size: 10px; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); }
    .xd-card .xd-label { margin-top: 6px; font-size: 14px; line-height: 1.4; color: var(--ink); }
    .xd-card-rejected { opacity: .65; }
    .xd-card-focus { box-shadow: 0 0 0 3px rgba(139,92,246,.35); }
    .controls { padding: 0 24px 16px; }
    .controls button { font: inherit; padding: 6px 14px; margin-right: 8px; border: 1px solid var(--line); border-radius: 6px; background: #fff; cursor: pointer; }
    .export-pane { padding: 0 24px 32px; }
    #export { background: #0f1117; color: #d7e0ef; padding: 14px; border-radius: 10px; font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; max-height: 320px; overflow: auto; }
    .muted { color: var(--muted); }
    #skipped { font-size: 12px; color: var(--muted); margin-top: 10px; }
  </style>
</head>
<body>
  <header>
    <h1>Lumen Light · Briefing Review</h1>
    <p>Assistant/operator-controlled. Step through the briefing, watch the source highlight, review proposals, export the accepted packet.</p>
  </header>

  <div class="controls">
    <button id="prev">‹ Previous turn</button>
    <button id="next">Next turn ›</button>
    <button id="exportBtn">Export accepted</button>
    <button id="debugExportBtn">Debug export (all)</button>
  </div>

  <div class="grid">
    <section class="pane">
      <h2>Source</h2>
      <div id="source"></div>
      <div id="skipped"></div>
    </section>
    <section class="pane">
      <h2>Agent briefing</h2>
      <div id="briefing"></div>
    </section>
    <section class="pane">
      <h2>Review</h2>
      <div id="staging"></div>
    </section>
  </div>

  <div class="projection-pane">
    <div class="projection-head">
      <h2 class="muted" style="font-size:12px;letter-spacing:.06em;text-transform:uppercase;">Excalidraw projection</h2>
      <label><input type="checkbox" id="projectionDebug" /> Show rejected (debug)</label>
      <span id="projectionMeta"></span>
    </div>
    <div id="projection"></div>
  </div>

  <div class="export-pane">
    <h2 class="muted" style="font-size:12px;letter-spacing:.06em;text-transform:uppercase;">Export</h2>
    <pre id="export">Accept artifacts, then click "Export accepted".</pre>
  </div>

  <script src="../src/briefing-review/state.js"></script>
  <script src="../src/briefing-review/source-pane.js"></script>
  <script src="../src/briefing-review/excalidraw-projection.js"></script>
  <script src="../src/briefing-review/demo.js"></script>
  <script>
    fetch('./briefing-session.example.json')
      .then((r) => r.json())
      .then((session) => {
        window.LumenBriefingDemo.startBriefingReview({
          session: session,
          elements: {
            source: document.getElementById('source'),
            skipped: document.getElementById('skipped'),
            briefing: document.getElementById('briefing'),
            staging: document.getElementById('staging'),
            projection: document.getElementById('projection'),
            projectionMeta: document.getElementById('projectionMeta'),
            projectionDebug: document.getElementById('projectionDebug'),
            export: document.getElementById('export'),
            prev: document.getElementById('prev'),
            next: document.getElementById('next'),
            exportBtn: document.getElementById('exportBtn'),
            debugExportBtn: document.getElementById('debugExportBtn'),
          },
        });
      })
      .catch((err) => {
        document.getElementById('source').textContent =
          'Could not load fixture. Serve the repo (python3 -m http.server) and open via http://. ' + err;
      });
  </script>
</body>
</html>
