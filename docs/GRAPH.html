<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Graphify</title>
<style>
  html, body { margin: 0; height: 100%; background: #050510; font: 13px/1.45 system-ui, sans-serif; }
  #graph { position: absolute; inset: 0; }
  .panel { position: absolute; z-index: 2; color: #c9c9d4; background: rgba(10,10,22,.72);
           border: 1px solid #26263a; border-radius: 10px; padding: 12px 16px; backdrop-filter: blur(4px); }
  #hdr { top: 16px; left: 16px; max-width: 380px; }
  #hdr h1 { margin: 0 0 2px; font-size: 16px; color: #eceef4; font-weight: 600; }
  #hdr p { margin: 0; color: #8f92a3; font-size: 12px; }
  #mode { margin-top: 6px; font-size: 11px; color: #8f92a3; }
  #mode .live { color: #4cc38a; } #mode .snap { color: #c9930a; }
  #legend { bottom: 16px; left: 16px; }
  #legend div { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
  #legend i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  #legend .dim { color: #8f92a3; font-size: 11px; margin-top: 8px; }
  .tip { max-width: 300px; }
  .tip b { color: #fff; } .tip .muted { color: #9aa; }
  #panelToggle { top: 16px; right: 16px; cursor: pointer; user-select: none;
                 display: flex; align-items: center; gap: 7px; font-size: 12px; }
  #panelToggle input { accent-color: #4cc38a; cursor: pointer; }
  body.panels-hidden #hdr, body.panels-hidden #legend { display: none; }
</style>
</head>
<body>
<div id="graph"></div>
<div id="hdr" class="panel"><h1 id="title">Graphify</h1>
<p>QTrellis register lineage · drag to orbit, scroll to zoom, hover a node · derived view — regenerate, never edit</p>
<div id="mode">loading…</div></div>
<div id="legend" class="panel"></div>
<label id="panelToggle" class="panel"><input type="checkbox" id="panelsChk" checked> legends</label>
<script type="module">
// esm.sh rewrites the whole bare-import tree; ?deps pins one shared three
// instance so our meshes and the graph's renderer use the same classes.
import ForceGraph3D from 'https://esm.sh/3d-force-graph@1.79.0?deps=three@0.180.0'
import * as THREE from 'https://esm.sh/three@0.180.0'
import SpriteText from 'https://esm.sh/three-spritetext@1.10.0?deps=three@0.180.0'
import { forceRadial } from 'https://esm.sh/d3-force-3d@3.0.6'

const SOURCE = "REGISTER.md"
const EMBEDDED = "# Product Register — Lumen Light (LL-)\n\nQTrellis register. Rules: `~/.claude/skills/qtrellis/SKILL.md`\nStable = UCXM has no − and no ?. Scores are lazy and must carry reasons.\nBackfilled 2026-07-02 from the sessions of 2026-06-27 → 2026-07-02.\n\n## Register\n\n| ID | Item (≤5 words) | From | Status | UCXM | Proof | Note |\n|----|-----------------|------|--------|------|-------|------|\n| LL-001 | Session re-grounding from canvas | — | built | | [ADR-0009](decisions/ADR-0009-session-regrounding-from-canvas.md) | theme: Continuity; resolved BUG-001 gap 1 |\n| LL-002 | Conversation transcript persists locally | LL-001 | built | | [ADR-0010](decisions/ADR-0010-persist-conversation-transcript.md) | resolved BUG-001 gap 2 |\n| LL-003 | Read canvas text inventory | LL-001 | built | ++++ | [SPEC](SPEC.md) | U: fixes blindness; C: 30min reuse; X: tiny text; M: no-arg tool |\n| LL-004 | Clear canvas, confirmed, undoable | — | built | ++0+ | [SPEC](SPEC.md) | theme: Control; U: restores lost capability; C: small; M: tool enforces confirm, not memory |\n| LL-005 | Board inventory, extensible tagging | — | built | ++0+ | [ADR-0012](decisions/ADR-0012-canvas-agnostic-inventory.md) | theme: Structure; U: unlocks addressing; C: one tested module; M: closed schema |\n| LL-006 | Hand-drawn content never invisible | LL-003 | built | | [KNOWN_ISSUES](KNOWN_ISSUES.md) | resolved BUG-004 |\n| LL-007 | Model recognizes freehand drawings | LL-006 | built | | [KNOWN_ISSUES](KNOWN_ISSUES.md) | verified live: \"house with sun\" |\n| RISK-001 | Big payloads kill voice channel | — | concept | | [ADR-0011](decisions/ADR-0011-visual-grounding-on-resume.md) | theme: Physics; X player defects ≥ ~256KB per message |\n| RISK-002 | Storage quota silently stops persistence | — | concept | | [ADR-0012](decisions/ADR-0012-canvas-agnostic-inventory.md) | theme: Persistence; screenshot images are megabytes; quota ~5MB; saveScene swallows failure |\n| GAP-002 | Surface and survive storage-quota failures | RISK-002 | concept | ++0+ | [ADR-0012](decisions/ADR-0012-canvas-agnostic-inventory.md) | U: prevents silent board loss; C: warn on save failure + slim scene; M: deterministic |\n| GAP-001 | Verify Inworld accepts remote image_url | RISK-001 | concept | ++?0 | [KNOWN_ISSUES](KNOWN_ISSUES.md) | U: unlocks vision tier; C: one-session spike; X: the unknown itself; gates IDEA-001/003 |\n\n## Ideas\n\n| ID | Item (≤5 words) | From | Status | UCXM | Proof | Note |\n|----|-----------------|------|--------|------|-------|------|\n| IDEA-001 | Full-res vision by URL reference | RISK-001 | idea | | | pixels over HTTP, not data channel |\n| IDEA-002 | Cheap fixed-size whole-board overview | RISK-001 | idea | ++0? | | U: Waldo queries; C: export scaling exists; M: legibility at 768px unverified |\n| IDEA-003 | Per-asset zoom by node id | IDEA-001 | idea | | | look at one thing full-res |\n| IDEA-004 | Take-me-to board navigation | LL-005 | idea | +++0 | | U: conversational navigation; C: one scrollToContent call; X: bytes; M: label matching may miss |\n| IDEA-005 | Model annotates items with tags | LL-005 | idea | 0+0? | | C: write path exists; U: unclear until retrieval consumes tags; M: tagging quality unknown |\n| IDEA-006 | Save board to Excalidraw library | LL-004 | idea | | | visible stash before clear; binary round-trip unverified |\n| IDEA-007 | Selection and viewport as focus | LL-005 | idea | ++++ | | U: fixes \"this one\"; C: appState read; X: bytes; M: deterministic signal |\n"
const POLL_MS = 5000

// ---- parse a QTrellis register (markdown) into graph data ----
const PALETTE = ['#2e9e5b', '#d6519f', '#b3830a', '#3f7fd4'] // validated, dark surface
const NEUTRAL = '#8a8a92'
const BRIGHT = { built: 1.0, supported: 1.0, spec: 0.65, concept: 0.55, idea: 0.35, deferred: 0.2, superseded: 0.15 }

function parseRegister(md) {
  const rows = []
  for (const line of md.split('\n')) {
    if (!line.startsWith('|')) continue
    const c = line.split('|').map((s) => s.trim())
    if (c.length < 8) continue
    const [, id, item, from, status, ucxm, , note] = c
    if (!id || id === 'ID' || /^-+$/.test(id)) continue
    const themeMatch = (note ?? '').match(/^theme:\s*([\w-]+)\s*;?\s*/i)
    rows.push({ id, item, from: from === '—' || from === '-' ? null : from, status, ucxm,
      note: themeMatch ? note.slice(themeMatch[0].length) : note, theme: themeMatch?.[1] ?? null })
  }
  const byId = new Map(rows.map((r) => [r.id, r]))
  const rootOf = (r) => {
    let cur = r
    const seen = new Set()
    while (cur.from && byId.has(cur.from) && !seen.has(cur.id)) { seen.add(cur.id); cur = byId.get(cur.from) }
    return cur.id
  }
  const clusterColor = new Map()
  for (const r of rows) {
    const root = rootOf(r)
    if (!clusterColor.has(root)) clusterColor.set(root, PALETTE[clusterColor.size] ?? NEUTRAL)
  }
  const descendants = new Map(rows.map((r) => [r.id, 0]))
  for (const r of rows) {
    let cur = r
    const seen = new Set()
    while (cur.from && byId.has(cur.from) && !seen.has(cur.id)) {
      seen.add(cur.id); cur = byId.get(cur.from)
      descendants.set(cur.id, (descendants.get(cur.id) ?? 0) + 1)
    }
  }
  const title = (md.match(/^# (.+)$/m) ?? [, 'Register'])[1].replace(/^Product Register — /, '')
  const kindOf = (id) => id.startsWith('RISK-') ? 'risk' : id.startsWith('GAP-') ? 'gap' : id.startsWith('IDEA-') ? 'idea' : 'feature'
  const nodes = rows.map((r) => ({
    id: r.id, item: r.item, status: r.status, ucxm: r.ucxm || '', note: r.note || '',
    theme: r.theme, kind: kindOf(r.id), depth: (() => { let d = 0, cur = r; const seen = new Set()
      while (cur.from && byId.has(cur.from) && !seen.has(cur.id)) { seen.add(cur.id); cur = byId.get(cur.from); d++ } return d })(),
    color: clusterColor.get(rootOf(r)), val: 2 + (descendants.get(r.id) ?? 0) * 3,
    glow: BRIGHT[r.status] ?? 0.4,
  }))
  const links = rows.filter((r) => r.from && byId.has(r.from)).map((r) => ({ source: r.from, target: r.id }))
  // The hub: the product itself. Every root ties into it, so the trellis is
  // one connected structure instead of drifting islands.
  const HUB = '__hub__'
  nodes.unshift({ id: HUB, item: title, status: '', ucxm: '', note: 'the product — all lineage roots attach here',
    kind: 'hub', depth: -1, color: '#e8e6df', val: 14, glow: 0.9 })
  for (const r of rows) if (!r.from || !byId.has(r.from)) links.push({ source: HUB, target: r.id, hub: true })
  return {
    title,
    legend: [...clusterColor.entries()].map(([root, color]) => ({
      root, item: byId.get(root)?.item ?? root, color, theme: byId.get(root)?.theme ?? null,
    })),
    nodes, links,
  }
}

// Legends toggle ('L' key works too); choice persists per browser.
const chk = document.getElementById('panelsChk')
const setPanels = (on) => {
  document.body.classList.toggle('panels-hidden', !on)
  chk.checked = on
  try { localStorage.setItem('graphify-panels', on ? '1' : '0') } catch { /* private mode */ }
}
chk.addEventListener('change', () => setPanels(chk.checked))
addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'l' && !e.metaKey && !e.ctrlKey) setPanels(!chk.checked) })
try { if (localStorage.getItem('graphify-panels') === '0') setPanels(false) } catch { /* default on */ }

// ---- render ----
const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
const Graph = ForceGraph3D()(document.getElementById('graph'))
  .backgroundColor('#050510')
  .nodeVal('val')
  .nodeThreeObject((n) => {
    const r = Math.cbrt(n.val) * 2.4
    // Shape = kind: hub dodecahedron, feature sphere, risk spiky octahedron,
    // gap ring (a hole where something should be), idea faint wireframe.
    const geo =
      n.kind === 'hub' ? new THREE.DodecahedronGeometry(r) :
      n.kind === 'risk' ? new THREE.OctahedronGeometry(r * 1.25) :
      n.kind === 'gap' ? new THREE.TorusGeometry(r * 0.95, r * 0.38, 12, 28) :
      new THREE.SphereGeometry(r, 24, 24)
    const mat = new THREE.MeshStandardMaterial({
      color: n.color, roughness: 0.3, metalness: 0.15,
      emissive: n.color, emissiveIntensity: n.glow,
      wireframe: n.kind === 'idea',
    })
    // Label by MEANING, not lattice id — the id lives in the tooltip. Core
    // items get larger, brighter text; leaves fade with their standing.
    const group = new THREE.Group()
    group.add(new THREE.Mesh(geo, mat))
    // Emergent category name: a root's declared theme floats above its
    // family, large and faint, in the family color.
    if (n.theme) {
      const theme = new SpriteText(n.theme)
      theme.textHeight = 9
      theme.color = n.color
      theme.material.opacity = 0.8
      theme.position.y = r + 12
      group.add(theme)
    }
    const label = new SpriteText(n.item)
    label.textHeight = n.kind === 'hub' ? 5 : n.depth <= 0 ? 3.6 : 2.8
    label.color = n.kind === 'hub' ? '#f2f0e8' : n.depth <= 0 ? '#c9c9d4' : '#8f92a3'
    label.position.y = -(r + 5)
    group.add(label)
    return group
  })
  .nodeLabel((n) => `<div class="panel tip"><b>${esc(n.id === '__hub__' ? n.item : n.id)}</b> · ${esc(n.kind)}${n.status ? ' · ' + esc(n.status) : ''}${n.ucxm ? ' · UCXM ' + esc(n.ucxm) : ''}<br>${esc(n.item)}${n.note ? '<br><span class="muted">' + esc(n.note) + '</span>' : ''}</div>`)
  .linkColor((l) => (l.hub ? '#2c2c46' : '#4a4a70'))
  .linkOpacity(0.7)
  .linkWidth((l) => (l.hub ? 0.8 : 1.8))
  .onNodeClick((n) => Graph.cameraPosition({ x: n.x * 1.4, y: n.y * 1.4, z: n.z * 1.4 + 60 }, n, 900))

// Orientation to the core: fundamentals near the center, derivation cascades
// outward — radius is lineage depth (hub 0, roots ring 1, children ring 2, …).
Graph.d3Force('radial', forceRadial((n) => (n.kind === 'hub' ? 0 : 55 + n.depth * 50), 0, 0, 0).strength(0.85))

function apply(md) {
  const d = parseRegister(md)
  document.getElementById('title').textContent = 'Graphify — ' + d.title
  document.title = 'Graphify — ' + d.title
  document.getElementById('legend').innerHTML =
    d.legend.map((l) => `<div><i style="background:${l.color}"></i>${l.theme ? '<b>' + esc(l.theme) + '</b> · ' : ''}${esc(l.root)} — ${esc(l.item)}</div>`).join('') +
    '<div class="dim">shape = kind: ⬢ product hub · ● feature · ◆ risk · ◎ gap · ○ idea (wireframe)<br>size = descendants · brightness = lifecycle · distance from core = derivation depth</div>'
  Graph.graphData(d)
}

// ---- live source (QT-008): fetch fresh, poll for change; snapshot fallback ----
const modeEl = document.getElementById('mode')
let last = null
async function refresh() {
  const r = await fetch(SOURCE + '?t=' + Date.now(), { cache: 'no-store' })
  if (!r.ok) throw new Error('HTTP ' + r.status)
  const md = await r.text()
  if (md !== last) { last = md; apply(md) }
}
try {
  await refresh()
  modeEl.innerHTML = '<span class="live">● live</span> — re-reads ' + esc(SOURCE) + ' every ' + POLL_MS / 1000 + 's'
  setInterval(() => refresh().catch(() => {}), POLL_MS)
} catch {
  apply(EMBEDDED)
  modeEl.innerHTML = '<span class="snap">● snapshot</span> — embedded at generation time (serve over http for live)'
}

// Bloom gives the glow; the graph is complete without it if the addon fails.
try {
  const { UnrealBloomPass } = await import('https://esm.sh/three@0.180.0/examples/jsm/postprocessing/UnrealBloomPass.js?deps=three@0.180.0')
  Graph.postProcessingComposer().addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.3, 0.6, 0.05))
} catch (e) { console.warn('bloom unavailable:', e) }
</script>
</body>
</html>
